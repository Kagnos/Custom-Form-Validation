<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Form Validation</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="script.js"></script>
</head>

<body>

<main>

    <form id="form" novalidate>

        <div class="form-item">
            <label for="email">Email</label>
            <input type="email" placeholder="example@email.com" id="email" name="user_email">
            <div id="email-error" class="error"></div>
        </div>

        <div class="form-item">
            <label for="country">Country</label>
            <input placeholder="USA" id="country" name="user_country">
            <div id="country-error" class="error"></div>
        </div>

        <div class="form-item">
            <label for="postal">Postal Code</label>
            <input placeholder="12345" id="postal" name="user_postal">
            <div id="postal-error" class="error"></div>
        </div>

        <div class="form-item">
            <label for="password">Password</label>
            <input type="password" placeholder="********" id="password" name="user_password">
            <div id="password-error" class="error"></div> 
        </div>

        <div class="form-item">
            <label for="password-confirm">Confirm Password</label>
            <input type="password" placeholder="********" id="password-confirm" name="user_password_confirm">
            <div id="password-confirm-error" class="error"></div>
        </div>

        <div class="form-button-group">
            <button type="reset">Reset</button>
            <button type="submit">Submit</button>
        </div>

    </form>

</main>

</body>
</html>
